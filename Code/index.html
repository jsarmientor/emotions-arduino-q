<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotions-Arduino-Q</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts/roboto-mono.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="img/RGB-Arduino-Logo_Color Inline Loop.svg" alt="Arduino Logo" class="logo">
            <h1>EdgeFace Recognition</h1>
            <p class="subtitle">Arduino UNO Q + face-api.js</p>
        </header>

        <main>
            <div class="video-container">
                <video id="video" width="640" height="480" autoplay muted></video>
                <div class="overlay">
                    <span id="current-expression">Initializing...</span>
                </div>
            </div>

            <div class="controls">
                <div class="exp-btn" id="btn-happy"><span>😃</span> Happy</div>
                <div class="exp-btn" id="btn-sad"><span>😢</span> Sad</div>
                <div class="exp-btn" id="btn-neutral"><span>😐</span> Neutral</div>
                <div class="exp-btn" id="btn-angry"><span>😡</span> Angry</div>
            </div>
        </main>
        
        <footer class="footer">
            <p>Powered by <strong>face-api.js</strong> and <strong>Arduino Bridge</strong></p>
        </footer>
    </div>

    <!-- Libraries -->
    <script src="libs/socket.io.min.js"></script>
    <script src="face-api.min.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
    <script src="script.js"></script>
</body>
</html>
